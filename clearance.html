<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clearance - EazyExchange</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <div class="container">
            <span>🔥 Free Shipping on Orders Over $35</span>
            <span>📦 24h Dispatch | 30-Day Returns</span>
        </div>
    </div>

    <!-- Header -->
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1>Eazy<span style="color: #FF6B35;">Exchange</span></h1>
                </div>
                <div class="search-bar">
                    <input type="text" placeholder="Search for amazing deals...">
                    <button><i class="fas fa-search"></i></button>
                </div>
                <div class="cart-icon" onclick="toggleCart()">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Categories Strip -->
    <div class="categories-strip">
        <div class="container">
            <a href="index.html">Home</a>
            <a href="fashion.html">Fashion</a>
            <a href="electronics.html">Electronics</a>
            <a href="home.html">Home</a>
            <a href="beauty.html">Beauty</a>
            <a href="sports.html">Sports</a>
            <a href="toys.html">Toys</a>
            <a href="pets.html">Pets</a>
            <a href="clearance.html" style="color: #FF6B35; font-weight: bold;">Clearance</a>
        </div>
    </div>

    <!-- Category Header -->
    <div class="category-header" style="background: linear-gradient(135deg, #FF4444 0%, #FF6B6B 100%);">
        <div class="container">
            <h1>Clearance - Up to 80% Off</h1>
            <div class="breadcrumb">
                <a href="index.html">Home</a> > <span>Clearance</span>
            </div>
        </div>
    </div>

    <!-- Products Section - 20 Products -->
    <section class="category-products">
        <div class="container">
            <div class="section-header">
                <h2>Clearance Items (20 Products)</h2>
                <div class="sort-dropdown">
                    <select>
                        <option>Sort by: Featured</option>
                        <option>Price: Low to High</option>
                        <option>Price: High to Low</option>
                        <option>Newest First</option>
                    </select>
                </div>
            </div>
            
            <div class="product-grid">
                <!-- Product 1 -->
                <div class="product-card">
                    <img src="images/clearance/item-1.jpg" alt="Clearance Item" class="product-image" onerror="this.src='https://via.placeholder.com/300x300?text=Clearance'">
                    <div class="product-badge">-70%</div>
                    <div class="product-info">
                        <h3 class="product-name">Winter Jacket - Last Season</h3>
                        <div class="product-price">$24.99 <small>$82.99</small></div>
                        <div class="product-rating">★★★★☆ <span>(1.2k sold)</span></div>
                        <div class="product-actions">
                            <button class="btn-add" onclick="addToCart({id:901, name:'Winter Jacket', price:24.99, image:'🧥'})"><i class="fas fa-cart-plus"></i> Add</button>
                            <button class="btn-whatsapp-small" onclick="orderNow({id:901, name:'Winter Jacket', price:24.99})"><i class="fab fa-whatsapp"></i> Buy</button>
                        </div>
                    </div>
                </div>

                <!-- Continue with 19 more clearance items -->
            </div>
        </div>
    </section>

    <!-- Cart Sidebar and Footer -->
    <div class="cart-sidebar" id="cartSidebar">...</div>
    <footer>...</footer>
    <script src="script.js"></script>
</body>
</html>
